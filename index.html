/* ── FACTION PALETTE ── */
:root{
  /* type 1=Imperial 2=Raider 3=Bloodthirsty 4=Xeno 5=Righteous 6=Progenitor */
  --f1:#00ccff; --f1b:#071828;
  --f2:#ff9922; --f2b:#1e0e00;
  --f3:#ff3333; --f3b:#200808;
  --f4:#00ee77; --f4b:#051a0d;
  --f5:#ffcc22; --f5b:#1a1600;
  --f6:#cc44ff; --f6b:#140820;
  /* rarity */
  --r1:#99aabc; --r2:#44bb66; --r3:#4488ff;
  --r4:#bb44ff; --r5:#ffaa22; --r6:#ff2266;
}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:#0c1018;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999}
#loading h1{font-size:26px;font-weight:900;letter-spacing:6px;color:#00ccff;
  text-shadow:0 0 30px #00ccff66;font-family:'Impact',sans-serif}
#load-track{width:320px;height:4px;background:#131e2b;border-radius:2px;overflow:hidden}
#load-bar{height:100%;background:linear-gradient(90deg,#006699,#00ccff);width:0;
  transition:width .3s;box-shadow:0 0 10px #00ccff}
#load-msg{font-size:11px;color:#3a5577;letter-spacing:2px}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh}

.sort-btn{padding:5px 9px;background:rgba(255,255,255,.05);border:1px solid #1a3040;
  color:#5577aa;font-size:11px;font-weight:700;cursor:pointer;border-radius:3px;
  letter-spacing:.3px;white-space:nowrap;display:flex;align-items:center;gap:3px}
.sort-btn:hover{border-color:#3a6088;color:#99bbcc}
.sort-btn.active{border-color:#00ccff88;color:#00ccff;background:rgba(0,180,255,.08)}
.sort-btn .sort-arrow{font-size:9px;opacity:.7}
#sort-wrap{display:flex;gap:4px;align-items:center;margin-right:6px}
/* ── TOPBAR ── */
#topbar{height:50px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(15,28,42,0.92) 0%,rgba(10,18,25,0.92) 100%);
  border-bottom:2px solid #0a3040;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  box-shadow:0 3px 14px rgba(0,0,0,.6)}
#topbar-logo{font-family:'Impact',sans-serif;font-size:20px;letter-spacing:3px;
  color:#00ccff;text-shadow:0 0 18px #00ccff55;white-space:nowrap}
#topbar-count{font-size:11px;color:#3a5577;margin-right:auto;white-space:nowrap}
#imgpath-lbl{font-size:11px;color:#3a5577;white-space:nowrap}
#imgpath-input{width:260px;background:#080f18;border:1px solid #1a3348;
  color:#8aaccc;padding:5px 9px;font-size:11px;border-radius:3px;outline:none}
#imgpath-input:focus{border-color:#00ccff55}
#filter-btn{padding:7px 18px;background:linear-gradient(180deg,#253c52,#162940);
  border:1px solid #2a5068;color:#99bbcc;font-size:13px;font-weight:700;
  letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .15s;white-space:nowrap}
#filter-btn:hover{border-color:#00ccff;color:#fff}
#filter-btn.active{border-color:#00ccff;color:#00ccff;box-shadow:0 0 10px #00ccff33}

/* ── GRID AREA ── */
#grid-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
#grid-scroller{flex:1;overflow:hidden;padding:10px 12px;display:flex;flex-direction:column}
#grid-scroller::-webkit-scrollbar{width:7px}
#grid-scroller::-webkit-scrollbar-track{background:#0a1018}
#grid-scroller::-webkit-scrollbar-thumb{background:#1a3348;border-radius:3px}
#card-grid{display:grid;grid-template-columns:repeat(var(--grid-cols,8),1fr);gap:7px}
#no-results{display:none;text-align:center;padding:60px 20px;color:#2a4055;
  font-size:13px;line-height:2.2}

/* ── PAGINATION ── */
#pagination{flex-shrink:0;background:#0c1420;border-top:1px solid #141e2c;
  padding:7px 12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pg{padding:3px 9px;border:1px solid #1a3040;background:#0a1828;color:#3a5577;
  font-size:11px;cursor:pointer;border-radius:3px;transition:all .12s}
.pg:hover:not(:disabled){border-color:#00ccff;color:#00ccff}
.pg.on{border-color:#00ccff;background:#0a2535;color:#00ccff}
.pg:disabled{opacity:.25;cursor:default}
#pg-info{margin-left:auto;font-size:10px;color:#2a3a4a}

/* ═══════════════════════ CARD TILE ═══════════════════════ */
.tile{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
  background:#0b1520;border:2px solid #141e2c;
  display:flex;flex-direction:column;transition:transform .14s,box-shadow .14s}
.tile:hover{transform:translateY(-3px)}
.tile[data-t="1"]:hover{border-color:var(--f1);box-shadow:0 6px 18px #00ccff44}
.tile[data-t="2"]:hover{border-color:var(--f2);box-shadow:0 6px 18px #ff992244}
.tile[data-t="3"]:hover{border-color:var(--f3);box-shadow:0 6px 18px #ff333344}
.tile[data-t="4"]:hover{border-color:var(--f4);box-shadow:0 6px 18px #00ee7744}
.tile[data-t="5"]:hover{border-color:var(--f5);box-shadow:0 6px 18px #ffcc2244}
.tile[data-t="6"]:hover{border-color:var(--f6);box-shadow:0 6px 18px #cc44ff44}

.tile-rar{height:3px;flex-shrink:0}
.r1 .tile-rar{background:var(--r1)} .r2 .tile-rar{background:var(--r2)}
.r3 .tile-rar{background:var(--r3)} .r4 .tile-rar{background:linear-gradient(90deg,var(--r4),#dd99ff)}
.r5 .tile-rar{background:linear-gradient(90deg,var(--r5),#ffdd88)}
.r6 .tile-rar{background:linear-gradient(90deg,var(--r6),#ff88aa)}

const _skillIconCache = {};
let _spriteLoaded = false;
const _spriteImgEl = new Image();
_spriteImgEl.onload = function() {
  _spriteLoaded = true;
  Object.keys(SKILL_SPRITE_MAP).forEach(sk => _renderSkillIcon(sk));
  document.querySelectorAll('.fsb[data-sk]').forEach(btn => {
    const sk = btn.dataset.sk, ic = _skillIconCache[sk];
    if(ic) { const img=btn.querySelector('img.sk-spr'); if(img){img.src=ic;img.style.opacity='1';} }
  });
};
_spriteImgEl.src = SKILL_ICONS_B64;

function _renderSkillIcon(skillId) {
  if(_skillIconCache[skillId]) return _skillIconCache[skillId];
  if(SKILL_STANDALONE[skillId]) { _skillIconCache[skillId]=SKILL_STANDALONE[skillId]; return SKILL_STANDALONE[skillId]; }
  if(!_spriteLoaded) return null;
  const m=SKILL_SPRITE_MAP[skillId]; if(!m) return null;
  const SIZE=24, cv=document.createElement('canvas');
  cv.width=SIZE; cv.height=SIZE;
  const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const rot=SKILL_ROTATION[skillId]||'0';
  ctx.save(); ctx.translate(SIZE/2,SIZE/2);
  if(rot.includes('270')) ctx.rotate(-Math.PI/2);
  else if(rot.includes('90')) ctx.rotate(Math.PI/2);
  else if(rot.includes('180')) ctx.rotate(Math.PI);
  if(rot.includes('flipH')) ctx.scale(-1,1);
  ctx.drawImage(_spriteImgEl,m.x,m.y,m.w,m.h,-SIZE/2,-SIZE/2,SIZE,SIZE);
  ctx.restore();
  const dataUrl=cv.toDataURL(); _skillIconCache[skillId]=dataUrl; return dataUrl;
}

function swapToCard(cardId, level) {
  const newCard = cards.find(r => String(r.id) === String(cardId));
  if(!newCard) return;
  selCard = newCard; selLvl = level || 0;
  renderDet(newCard, selLvl);
}

function load(){
  const bar=document.getElementById('load-bar');
  const msg=document.getElementById('load-msg');
  msg.textContent='Loading card database...'; bar.style.width='10%';
if(window.electronAPI&&window.electronAPI.onUpdateStatus){
    window.electronAPI.onUpdateStatus(function(s){
      const el=document.getElementById('update-status'); if(!el) return;
      if(s.state==='checking'){el.textContent='Checking for updates...';}
      else if(s.state==='downloading'){el.textContent='Downloading update '+Math.round(s.progress||0)+'%';}
      else if(s.state==='ready'){el.textContent='Update ready - restart to apply';}
      else if(s.state==='error'){el.textContent='Update error: '+s.error;}
      setTimeout(()=>el.textContent='',4000);
    });
  }
  fetch('tu_data.json')
  .then(function(r){ return r.json(); })
  .then(function(d){
    cards=d.cards; skNames=d.skill_names; skDescs=d.skill_descs;
    skDescsAll=d.skill_descs_all||{}; skDescsFac=d.skill_descs_fac||{};
    skDescsAllFac=d.skill_descs_all_fac||{};
    fusMap=d.fusion_map; fusFrom=d.fusion_from||{}; fusTo=d.fusion_to||{};
    idToName=d.id_to_name||{}; baseFusFrom=d.base_fusion_from||{};
    baseFusTo=d.base_fusion_to||{}; summonedBy=d.summoned_by||{};
    bar.style.width='100%'; msg.textContent='Done!';
    setTimeout(init,100);
  })
  .catch(function(e){
    msg.style.color='#ff4444';
    msg.textContent='Error loading tu_data.json: '+e;
  });
}

function buildSkillGrid(){
  const allSk=[...new Set([...Object.keys(SPATH),...Object.keys(SKILL_STANDALONE)])].sort();
  document.getElementById('fd-sk-grid').innerHTML=allSk.map(sk=>{
    const c=SCOL[sk]||'#aabbcc', nm=skNames[sk]||sk;
    const cached=_skillIconCache[sk];
    const icoHtml=cached
      ?`<img class="sk-spr" src="${cached}" style="width:21px;height:21px;image-rendering:pixelated;display:block;margin:0 auto">`
      :(SKILL_SPRITE_MAP[sk]||SKILL_STANDALONE[sk])
        ?`<img class="sk-spr" src="" style="width:21px;height:21px;display:block;margin:0 auto;opacity:0">`
        :`<svg viewBox="0 0 32 32" style="fill:${c};color:${c}">${SPATH[sk]||''}</svg>`;
    return `<div class="fsb" data-sk="${sk}">${icoHtml}<div class="fsb-tt">${nm}</div></div>`;
  }).join('');
  allSk.forEach(sk=>{const ic=_renderSkillIcon(sk);if(ic){const img=document.querySelector(`.fsb[data-sk="${sk}"] img.sk-spr`);if(img){img.src=ic;img.style.opacity='1';}}});
  document.querySelectorAll('.fsb').forEach(b=>
    b.addEventListener('click',()=>b.classList.toggle('on')));
}

function bindUI(){
  document.getElementById('filter-btn').addEventListener('click',openFlt);

    if(e.target===document.getElementById('det-modal')) closeDet();
  });
  document.getElementById('flt-modal').addEventListener('click',e=>{
    if(e.target===document.getElementById('flt-modal')) closeFlt();
  });
  // toggle filter icon buttons (rarity, faction, delay, fusion, type)
  ['fd-rar','fd-fac','fd-delay','fd-fus','fd-utype'].forEach(id=>{
    document.getElementById(id)?.querySelectorAll('.fib').forEach(b=>
      b.addEventListener('click',()=>b.classList.toggle('on')));
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if(!document.getElementById('det-modal').classList.contains('h')) closeDet();
      else closeFlt();
    }
  });
}

function imgSrc(pic){
  if(!pic) return '';
  if(!pic.includes('.')) pic=pic+'.jpg';
  return 'images/'+pic;
}
function imgErr(el){
  const src=el.src;
  if(src.endsWith('.jpg')){
    el.src=src.replace(/\.jpg$/,'.png');
  } else if(src.endsWith('.png')){
    el.src=''; // both failed, give up
  }
}
function refreshImgs(){
  document.querySelectorAll('[data-pic]').forEach(el=>{
    const p=el.dataset.pic; if(p) el.src=imgSrc(p);
  });
  if(selCard) renderDet(selCard,selLvl);
}

// ════════════════════════════════════════════════════════
//  FILTER LOGIC
// ════════════════════════════════════════════════════════
function maxD(c){
  if(!c.upgrades||!c.upgrades.length) return c;
  const u=c.upgrades[c.upgrades.length-1];
  return {...c,...u,skills:u.skills.length?u.skills:c.skills};
}
function lvlD(c,i){
  if(i===0) return c;
  const u=c.upgrades[i-1];
  return {...c,...u,skills:u.skills.length?u.skills:c.skills};
}
function cardSk(c){
  return [...c.skills,...c.upgrades.flatMap(u=>u.skills)].map(s=>s.id);
}

function matches(c){
  if(fa.search && !c.name.toLowerCase().includes(fa.search)) return false;
  if(fa.rar.size && !fa.rar.has(c.rarity)) return false;
  if(fa.ut.size  && !fa.ut.has(c.unit_type)) return false;
  if(fa.fac.size && !fa.fac.has(c.type)) return false;
  if(fa.del.size && !fa.del.has(String(maxD(c).cost||0))) return false;
  if(fa.fus.size && !fa.fus.has(c.fusion_level||'0')) return false;
  if(fa.sk.size){
    const all=cardSk(c);
    if(![...fa.sk].every(s=>all.includes(s))) return false;
  }
  return true;
}


// -- Dynamic grid layout -----------------------------------------------------
const TILE_MIN_W = 160, TILE_GAP = 7, FOOT_H = 48;

function calcGrid() {
  const ga = document.getElementById('grid-area');
  // Use clientWidth if available, fall back to window width minus scrollbar
  const gw = Math.max(ga.clientWidth, window.innerWidth) - 24;
  const gh = Math.max(ga.clientHeight, window.innerHeight - 50) - FOOT_H - 20;
  if (gw < 100) { requestAnimationFrame(calcGrid); return; } // not laid out yet
  const cols = Math.min(13, Math.max(3, Math.floor((gw + TILE_GAP) / (TILE_MIN_W + TILE_GAP))));
  const tileW = Math.floor((gw - (cols-1)*TILE_GAP) / cols);
  const tileH = Math.round(tileW / 1.05) + 40;
  const rows  = Math.min(5, Math.max(1, Math.floor((gh + TILE_GAP) / (tileH + TILE_GAP))));
  document.documentElement.style.setProperty('--grid-cols', cols);
  const newPage = cols * rows;
  if (newPage !== PAGE) {
    PAGE = newPage; page = 0;
    if(typeof filtered !== 'undefined' && filtered.length) { renderGrid(); renderPg(); }
  }
}

// ResizeObserver for accurate resize detection
if(window.ResizeObserver) {
  let _ro = new ResizeObserver(() => calcGrid());
  document.addEventListener('DOMContentLoaded', () => {
    const ga = document.getElementById('grid-area');
    if(ga) _ro.observe(ga);
  });
} else {
  let _rt;
  window.addEventListener('resize', () => { clearTimeout(_rt); _rt = setTimeout(calcGrid, 80); });
}

let sortKey='name', sortAsc=true;
function setSort(key){
  if(sortKey===key){ sortAsc=!sortAsc; } else { sortKey=key; sortAsc=(key==='name'); }
  document.querySelectorAll('.sort-btn').forEach(b=>{
    const on=b.dataset.sort===sortKey;
    b.classList.toggle('active',on);
    b.querySelector('.sort-arrow').textContent=on?(sortAsc?'↑':'↓'):'';
  });
  applyF();
}
function applyF(){
  filtered=cards.filter(matches);
  filtered.sort((a,b)=>{
    if(sortKey==='name')     {const r=( a.name||'').localeCompare(b.name||''); return sortAsc?r:-r;}
    if(sortKey==='id')       {const va=parseInt(a.id)||0,vb=parseInt(b.id)||0; return sortAsc?va-vb:vb-va;}
    if(sortKey==='type')     {const r=( a.type||'').localeCompare(b.type||''); return sortAsc?r:-r;}
    if(sortKey==='unit_type'){const r=(a.unit_type||'').localeCompare(b.unit_type||''); return sortAsc?r:-r;}
    const vals={rarity:[parseInt(a.rarity)||0,parseInt(b.rarity)||0],
                delay:[parseInt(maxD(a).cost)||0,parseInt(maxD(b).cost)||0],
                fusion:[parseInt(a.fusion_level)||0,parseInt(b.fusion_level)||0]};
    const [va,vb]=vals[sortKey]||[0,0]; return sortAsc?va-vb:vb-va;
  });
  page=0;
  document.getElementById('topbar-count').textContent=
    filtered.length.toLocaleString()+' / '+cards.length.toLocaleString()+' cards';
  const hasF=fa.rar.size||fa.ut.size||fa.fac.size||fa.fus.size||fa.sk.size||fa.search;
  document.getElementById('filter-btn').classList.toggle('active',!!hasF);
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('card-grid');
  const nr=document.getElementById('no-results');
  if(!filtered.length){g.innerHTML='';nr.style.display='block';renderPg();return;}
  nr.style.display='none';
  const slice=filtered.slice(page*PAGE,(page+1)*PAGE);
  const frag=document.createDocumentFragment();
  slice.forEach(c=>{
    const d=maxD(c);
    const f=FAC[c.type]||FAC['0'];
    const maxL=1+(c.upgrades||[]).length;
    const el=document.createElement('div');
    el.className=`tile r${c.rarity}`; el.dataset.t=c.type;
    const src=imgSrc(d.picture);
    el.innerHTML=`
      <div class="tile-rar"></div>
      <div class="tile-art">
        ${src?`<img src="${src}" data-pic="${d.picture}" alt="" loading="lazy" onerror="imgErr(this)">`:''}
        <div class="tile-no-art" style="${src?'display:none':''}">
          <div style="font-size:14px;color:#1a2a3a">🖼</div>
          <div>${d.picture||'no image'}</div>
        </div>
        <div class="tile-fdot">${FACTION_ICONS[c.type]?`<img src="${FACTION_ICONS[c.type]}" alt="">`:''}</div>
        ${d.cost!==undefined?`<div class="tile-cost">${DELAY_ICONS[String(d.cost)]?'<img src="'+DELAY_ICONS[String(d.cost)]+'">':'<span>'+d.cost+'</span>'}</div>`:''}
        <div class="tile-stats">
          <div class="ts ts-a"><img src="${ATK_ICON}" style="width:12px;height:12px;image-rendering:pixelated"><span>${d.attack||0}</span></div>
          <div class="ts ts-h"><span>${d.health||0}</span><img src="${HP_ICON}" style="width:12px;height:12px;image-rendering:pixelated"></div>
        </div>
      </div>
      <div class="tile-name"><div class="tile-name-text">${c.name||'(ID:'+c.id+')'}
        <div class="tile-sub">${f.name} · Lv.${maxL}${c.unit_type!=='assault'?' · '+c.unit_type:''}</div>
      </div>${FUSION_ICONS[String(c.fusion_level||0)]?`<div class="tile-fus"><img src="${FUSION_ICONS[String(c.fusion_level||0)]}"></div>`:''}</div>`;
    el.addEventListener('click',()=>openDet(c));
    frag.appendChild(el);
  });
  g.innerHTML=''; g.appendChild(frag);
  renderPg();
}

function renderPg(){
  const pg=document.getElementById('pagination');
  const tot=Math.ceil(filtered.length/PAGE);
  if(tot<=1){pg.innerHTML='';return;}
  const s=page*PAGE+1, e=Math.min((page+1)*PAGE,filtered.length);
  let h=`<button class="pg" ${page===0?'disabled':''} onclick="goP(${page-1})">◀</button>`;
  let sp=Math.max(0,page-3), ep=Math.min(tot-1,sp+6);
  if(ep-sp<6) sp=Math.max(0,ep-6);
  if(sp>0) h+=`<button class="pg" onclick="goP(0)">1</button><span style="color:#1a3040;padding:0 3px">…</span>`;
  for(let i=sp;i<=ep;i++) h+=`<button class="pg ${i===page?'on':''}" onclick="goP(${i})">${i+1}</button>`;
  if(ep<tot-1) h+=`<span style="color:#1a3040;padding:0 3px">…</span><button class="pg" onclick="goP(${tot-1})">${tot}</button>`;
  h+=`<button class="pg" ${page===tot-1?'disabled':''} onclick="goP(${page+1})">▶</button>`;
  h+=`<div id="pg-info">${s}–${e} of ${filtered.length.toLocaleString()}</div>`;
  pg.innerHTML=h;
}
function goP(p){page=p;renderGrid();document.getElementById('grid-scroller').scrollTop=0;}

function typeIcon(type,ut,col){
  if(ut==='commander')
    return `<svg viewBox="0 0 32 32" fill="${col}"><circle cx="16" cy="9" r="5"/><rect x="8" y="14" width="16" height="12" rx="3"/><rect x="10" y="12" width="12" height="4" rx="2"/></svg>`;
  if(ut==='structure')
    return `<svg viewBox="0 0 32 32" fill="none" stroke="${col}" stroke-width="2"><rect x="9" y="5" width="14" height="22" rx="2"/><rect x="12" y="9" width="8" height="7" rx="1" fill="${col}"/><rect x="13" y="18" width="6" height="9" rx="1" fill="${col}"/></svg>`;
  // assault – faction-based
  const icons={
    '1':`<svg viewBox="0 0 32 32" fill="${col}"><rect x="4" y="13" width="18" height="7" rx="2"/><rect x="13" y="10" width="11" height="4" rx="1"/><rect x="2" y="18" width="22" height="4" rx="2"/><circle cx="6" cy="22" r="3"/><circle cx="17" cy="22" r="3"/></svg>`,
    '2':`<svg viewBox="0 0 32 32" fill="${col}"><path d="M10 8 L16 12 L22 8 L22 18 L16 24 L10 18 Z" fill="none" stroke="${col}" stroke-width="2"/><path d="M13 14 L16 18 L19 14" fill="none" stroke="${col}" stroke-width="2"/></svg>`,
    '3':`<svg viewBox="0 0 32 32" fill="${col}"><path d="M16 5 C16 5 23 12 21 20 C19 25 16 27 16 27 C16 27 13 25 11 20 C9 12 16 5 16 5Z"/></svg>`,
    '4':`<svg viewBox="0 0 32 32" fill="${col}"><path d="M16 6 L21 11 L21 18 L16 23 L11 18 L11 11 Z" fill="none" stroke="${col}" stroke-width="2"/><circle cx="16" cy="14" r="3"/></svg>`,
    '5':`<svg viewBox="0 0 32 32" fill="${col}"><path d="M16 4 L19 12 L27 12 L21 17 L23 24 L16 20 L9 24 L11 17 L5 12 L13 12 Z"/></svg>`,
    '6':`<svg viewBox="0 0 32 32" fill="${col}"><circle cx="16" cy="16" r="10" fill="none" stroke="${col}" stroke-width="2"/><circle cx="16" cy="16" r="5"/><circle cx="16" cy="16" r="8" fill="none" stroke="${col}" stroke-width="1" stroke-dasharray="2 2"/></svg>`,
  };
  return icons[type]||`<svg viewBox="0 0 32 32" fill="${col}"><circle cx="16" cy="16" r="10"/></svg>`;
}

function openFlt(){
  // Sync UI to current active state
  document.getElementById('fd-search').value=fa.search;
  document.querySelectorAll('.fib,.fsb').forEach(b=>b.classList.remove('on'));
  fa.rar.forEach(v=>document.querySelector(`.fib[data-rar="${v}"]`)?.classList.add('on'));
  fa.ut .forEach(v=>document.querySelector(`.fib[data-ut="${v}"]`)?.classList.add('on'));
  fa.fac.forEach(v=>document.querySelector(`.fib[data-fac="${v}"]`)?.classList.add('on'));
  fa.del.forEach(v=>document.querySelector(`.fib[data-del="${v}"]`)?.classList.add('on'));
  fa.fus.forEach(v=>document.querySelector(`.fib[data-fus="${v}"]`)?.classList.add('on'));
  fa.sk .forEach(v=>document.querySelector(`.fsb[data-sk="${v}"]`)?.classList.add('on'));
  document.getElementById('flt-modal').classList.remove('h');
  document.getElementById('fd-search').focus();
}
function closeFlt(){document.getElementById('flt-modal').classList.add('h');}

function applyFlt(){
  fa.search=document.getElementById('fd-search').value.trim().toLowerCase();
  fa.rar=new Set([...document.querySelectorAll('.fib[data-rar].on')].map(b=>b.dataset.rar));
  fa.ut =new Set([...document.querySelectorAll('.fib[data-ut].on')].map(b=>b.dataset.ut));
  fa.fac=new Set([...document.querySelectorAll('.fib[data-fac].on')].map(b=>b.dataset.fac));
  fa.del=new Set([...document.querySelectorAll('.fib[data-del].on')].map(b=>b.dataset.del));
  fa.fus=new Set([...document.querySelectorAll('.fib[data-fus].on')].map(b=>b.dataset.fus));
  fa.sk =new Set([...document.querySelectorAll('.fsb.on')].map(b=>b.dataset.sk));
  closeFlt(); applyF();
}
function clearFlt(){
  document.getElementById('fd-search').value='';
  document.querySelectorAll('.fib,.fsb').forEach(b=>b.classList.remove('on'));
}
